services:
  test-db:
    image: postgres:16-alpine
    container_name: llmtokenhub-test-db
    environment:
      POSTGRES_DB: llmtokenhub_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 2s
      retries: 5
